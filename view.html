<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Available Food — FoodShare</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root { --green:#2ecc71; --green-dark:#27ae60; --orange:#f39c12; --dark:#0d1117; --dark2:#161b22; --dark3:#21262d; --text:#e6edf3; --text-muted:#8b949e; --white:#ffffff; --radius:16px; }
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'DM Sans',sans-serif; background:var(--dark); color:var(--text); min-height:100vh; }
nav { display:flex; justify-content:space-between; align-items:center; padding:16px 40px; background:var(--dark2); border-bottom:1px solid rgba(255,255,255,0.06); position:sticky; top:0; z-index:100; }
.logo { display:flex; align-items:center; gap:10px; }
.logo-icon { width:34px; height:34px; background:var(--green); border-radius:9px; display:flex; align-items:center; justify-content:center; font-size:16px; }
.logo h2 { font-family:'Playfair Display',serif; font-size:20px; color:var(--white); }
.nav-links { display:flex; gap:4px; }
.nav-links a { color:var(--text-muted); text-decoration:none; font-size:14px; font-weight:500; padding:8px 14px; border-radius:8px; transition:0.2s; }
.nav-links a:hover, .nav-links a.active { color:var(--white); background:var(--dark3); }
.nav-logout { background:transparent; border:1px solid rgba(255,255,255,0.1); color:var(--text-muted); padding:7px 14px; border-radius:8px; cursor:pointer; font-size:13px; font-family:'DM Sans',sans-serif; transition:0.2s; }
.nav-logout:hover { background:var(--dark3); color:var(--white); }
.page { max-width:1200px; margin:0 auto; padding:40px 30px; }
.page-header { margin-bottom:32px; display:flex; justify-content:space-between; align-items:flex-end; flex-wrap:wrap; gap:16px; }
.page-header h1 { font-family:'Playfair Display',serif; font-size:30px; color:var(--white); margin-bottom:6px; }
.page-header p { color:var(--text-muted); }
.filters { display:flex; gap:10px; flex-wrap:wrap; }
.filter-btn { background:var(--dark3); border:1px solid rgba(255,255,255,0.1); color:var(--text-muted); padding:8px 16px; border-radius:8px; cursor:pointer; font-size:13px; font-family:'DM Sans',sans-serif; transition:0.2s; }
.filter-btn.active, .filter-btn:hover { background:var(--green); color:var(--dark); border-color:var(--green); font-weight:600; }
.search-wrap { position:relative; }
.search-wrap i { position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--text-muted); }
.search-wrap input { background:var(--dark3); border:1px solid rgba(255,255,255,0.1); border-radius:10px; padding:10px 14px 10px 36px; color:var(--text); font-size:14px; font-family:'DM Sans',sans-serif; width:240px; }
.search-wrap input:focus { outline:none; border-color:var(--green); }
.search-wrap input::placeholder { color:var(--text-muted); }
.cards-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:20px; }
.food-card { background:var(--dark2); border:1px solid rgba(255,255,255,0.07); border-radius:var(--radius); padding:24px; transition:0.3s; }
.food-card:hover { border-color:rgba(46,204,113,0.3); transform:translateY(-3px); box-shadow:0 10px 30px rgba(0,0,0,0.3); }
.food-card-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:16px; }
.food-name { font-size:18px; font-weight:700; color:var(--white); }
.food-provider { font-size:12px; color:var(--text-muted); margin-top:2px; }
.food-expiry { background:rgba(243,156,18,0.1); border:1px solid rgba(243,156,18,0.2); color:var(--orange); padding:4px 10px; border-radius:20px; font-size:12px; font-weight:600; white-space:nowrap; }
.food-details { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px; }
.food-detail { background:var(--dark3); border-radius:8px; padding:10px 12px; }
.food-detail .d-label { font-size:11px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:4px; }
.food-detail .d-val { font-size:14px; font-weight:600; color:var(--white); }
.food-notes { font-size:13px; color:var(--text-muted); margin-bottom:18px; line-height:1.6; }
.btn-req { width:100%; padding:11px; border:none; border-radius:10px; background:var(--green); color:var(--dark); font-size:14px; font-weight:700; cursor:pointer; font-family:'DM Sans',sans-serif; transition:0.2s; }
.btn-req:hover { background:var(--green-dark); }
.btn-req:disabled { background:var(--dark3); color:var(--text-muted); cursor:not-allowed; font-weight:500; }
.empty-state { text-align:center; padding:80px 20px; color:var(--text-muted); }
.empty-state i { font-size:50px; margin-bottom:16px; opacity:0.3; display:block; }
.toast { position:fixed; bottom:24px; right:24px; background:var(--dark2); border:1px solid rgba(46,204,113,0.3); border-radius:12px; padding:14px 20px; color:var(--white); font-size:14px; display:flex; align-items:center; gap:10px; z-index:999; transform:translateY(80px); opacity:0; transition:0.3s; }
.toast.show { transform:translateY(0); opacity:1; }
.toast i { color:var(--green); }
</style>
</head>
<body>
<nav>
  <div class="logo"><div class="logo-icon">🌿</div><h2>FoodShare</h2></div>
  <div class="nav-links">
    <a href="dashboard.html">Dashboard</a>
    <a href="view.html" class="active">Available Food</a>
    <a href="my-requests.html">My Requests</a>
  </div>
  <button class="nav-logout" onclick="logout()">Logout</button>
</nav>

<div class="page">
  <div class="page-header">
    <div>
      <h1>🥘 Available Food</h1>
      <p>Browse all current food donations ready for pickup</p>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;">
      <div class="search-wrap">
        <i class="fa fa-search"></i>
        <input type="text" id="search" placeholder="Search food, location..." oninput="render()">
      </div>
    </div>
  </div>
  <div class="cards-grid" id="grid"></div>
</div>

<div class="toast" id="toast"><i class="fa fa-check-circle"></i><span id="toast-msg"></span></div>

<script src="db.js"></script>
<script>
const user = DB.requireAuth('consumer');

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  let foods = DB.getAvailableFoods();
  if (q) foods = foods.filter(f => f.name.toLowerCase().includes(q) || f.location.toLowerCase().includes(q) || (f.details||'').toLowerCase().includes(q));
  const myReqs = DB.getRequestsByConsumer(user.id);
  const reqIds = myReqs.map(r => r.foodId);
  const grid = document.getElementById('grid');
  if (!foods.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><i class="fa fa-box-open"></i><h3>No food available right now</h3><p>Check back soon — providers add new donations regularly.</p></div>`;
    return;
  }
  grid.innerHTML = foods.map(f => {
    const already = reqIds.includes(f.id);
    return `<div class="food-card">
      <div class="food-card-top">
        <div><div class="food-name">${f.name}</div><div class="food-provider">by ${f.providerName||'Anonymous'}</div></div>
        <div class="food-expiry"><i class="fa fa-clock"></i> ${f.expiry}</div>
      </div>
      <div class="food-details">
        <div class="food-detail"><div class="d-label">Quantity</div><div class="d-val">${f.quantity}</div></div>
        <div class="food-detail"><div class="d-label">Location</div><div class="d-val">${f.location}</div></div>
      </div>
      ${f.details ? `<div class="food-notes"><i class="fa fa-info-circle" style="color:var(--text-muted);margin-right:4px"></i>${f.details}</div>` : ''}
      ${already 
        ? `<button class="btn-req" disabled>✓ Already Requested</button>`
        : `<button class="btn-req" onclick="req(${f.id},'${f.name}','${f.providerId}','${f.providerName}')">Request This Food</button>`}
    </div>`;
  }).join('');
}

function req(foodId, foodName, providerId, providerName) {
  DB.addRequest({ foodId, foodName, consumerId:user.id, consumerName:user.name, providerId, providerName });
  showToast('Request sent for ' + foodName + '!');
  render();
}

function showToast(msg) {
  document.getElementById('toast-msg').textContent = msg;
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
function logout() { DB.clearSession(); window.location.href='login.html'; }
render();
</script>
</body>
</html>
