<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consumer Dashboard — FoodShare</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
  --green:#2ecc71; --green-dark:#27ae60; --green-light:rgba(46,204,113,0.1);
  --orange:#f39c12; --blue:#3498db; --red:#e74c3c;
  --dark:#0d1117; --dark2:#161b22; --dark3:#21262d;
  --text:#e6edf3; --text-muted:#8b949e; --white:#ffffff;
  --radius:16px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'DM Sans',sans-serif; background:var(--dark); color:var(--text); min-height:100vh; }

/* NAV */
nav { display:flex; justify-content:space-between; align-items:center; padding:16px 40px; background:var(--dark2); border-bottom:1px solid rgba(255,255,255,0.06); position:sticky; top:0; z-index:100; }
.logo { display:flex; align-items:center; gap:10px; }
.logo-icon { width:34px; height:34px; background:var(--green); border-radius:9px; display:flex; align-items:center; justify-content:center; font-size:16px; }
.logo h2 { font-family:'Playfair Display',serif; font-size:20px; color:var(--white); }
.nav-links { display:flex; gap:4px; align-items:center; }
.nav-links a { color:var(--text-muted); text-decoration:none; font-size:14px; font-weight:500; padding:8px 14px; border-radius:8px; transition:0.2s; }
.nav-links a:hover, .nav-links a.active { color:var(--white); background:var(--dark3); }
.nav-user { display:flex; align-items:center; gap:12px; }
.user-avatar { width:36px; height:36px; background:var(--green-light); border:1px solid rgba(46,204,113,0.3); border-radius:50%; display:flex; align-items:center; justify-content:center; color:var(--green); font-weight:700; font-size:14px; }
.nav-logout { background:transparent; border:1px solid rgba(255,255,255,0.1); color:var(--text-muted); padding:7px 14px; border-radius:8px; cursor:pointer; font-size:13px; font-family:'DM Sans',sans-serif; transition:0.2s; }
.nav-logout:hover { background:var(--dark3); color:var(--white); }

/* LAYOUT */
.page { max-width:1200px; margin:0 auto; padding:40px 30px; }
.page-header { margin-bottom:32px; }
.page-header h1 { font-family:'Playfair Display',serif; font-size:30px; color:var(--white); margin-bottom:6px; }
.page-header p { color:var(--text-muted); font-size:15px; }

/* STATS */
.stats-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:16px; margin-bottom:32px; }
.stat-card { background:var(--dark2); border:1px solid rgba(255,255,255,0.07); border-radius:var(--radius); padding:24px; }
.stat-card .icon { font-size:24px; margin-bottom:12px; }
.stat-card .num { font-family:'Playfair Display',serif; font-size:32px; color:var(--white); font-weight:700; }
.stat-card .label { font-size:13px; color:var(--text-muted); margin-top:4px; }

/* FOOD TABLE */
.section-card { background:var(--dark2); border:1px solid rgba(255,255,255,0.07); border-radius:var(--radius); overflow:hidden; margin-bottom:24px; }
.section-head { display:flex; justify-content:space-between; align-items:center; padding:20px 24px; border-bottom:1px solid rgba(255,255,255,0.06); }
.section-head h3 { color:var(--white); font-size:17px; font-weight:600; }
.search-bar { position:relative; }
.search-bar i { position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--text-muted); font-size:13px; }
.search-bar input { background:var(--dark3); border:1px solid rgba(255,255,255,0.1); border-radius:8px; padding:8px 12px 8px 32px; color:var(--text); font-size:13px; font-family:'DM Sans',sans-serif; width:200px; }
.search-bar input:focus { outline:none; border-color:var(--green); }
.search-bar input::placeholder { color:var(--text-muted); }

table { width:100%; border-collapse:collapse; }
th { background:var(--dark3); color:var(--text-muted); font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; padding:14px 16px; text-align:left; }
td { padding:14px 16px; border-bottom:1px solid rgba(255,255,255,0.04); font-size:14px; }
tr:last-child td { border-bottom:none; }
tr:hover td { background:rgba(255,255,255,0.02); }

.badge { display:inline-block; padding:4px 10px; border-radius:20px; font-size:12px; font-weight:600; }
.badge-available { background:rgba(46,204,113,0.12); color:var(--green); }
.badge-pending { background:rgba(243,156,18,0.12); color:var(--orange); }
.badge-approved { background:rgba(52,152,219,0.12); color:var(--blue); }
.badge-rejected { background:rgba(231,76,60,0.12); color:var(--red); }

.btn-req { background:var(--green-light); border:1px solid rgba(46,204,113,0.2); color:var(--green); padding:7px 16px; border-radius:8px; cursor:pointer; font-size:13px; font-weight:600; font-family:'DM Sans',sans-serif; transition:0.2s; }
.btn-req:hover { background:var(--green); color:var(--dark); }
.btn-req:disabled { opacity:0.4; cursor:not-allowed; }

.empty { text-align:center; padding:60px 20px; color:var(--text-muted); }
.empty i { font-size:40px; margin-bottom:12px; opacity:0.4; display:block; }

/* TOAST */
.toast { position:fixed; bottom:24px; right:24px; background:var(--dark2); border:1px solid rgba(46,204,113,0.3); border-radius:12px; padding:14px 20px; color:var(--white); font-size:14px; display:flex; align-items:center; gap:10px; z-index:999; transform:translateY(80px); opacity:0; transition:0.3s; }
.toast.show { transform:translateY(0); opacity:1; }
.toast i { color:var(--green); }
</style>
</head>
<body>

<nav>
  <div class="logo">
    <div class="logo-icon">🌿</div>
    <h2>FoodShare</h2>
  </div>
  <div class="nav-links">
    <a href="dashboard.html" class="active"><i class="fa fa-home"></i> Dashboard</a>
    <a href="view.html"><i class="fa fa-utensils"></i> Available Food</a>
    <a href="my-requests.html"><i class="fa fa-list"></i> My Requests</a>
  </div>
  <div class="nav-user">
    <div class="user-avatar" id="avatar">U</div>
    <button class="nav-logout" onclick="logout()"><i class="fa fa-sign-out-alt"></i> Logout</button>
  </div>
</nav>

<div class="page">
  <div class="page-header">
    <h1>Welcome back, <span id="user-name">Consumer</span> 👋</h1>
    <p>Browse available food donations and track your requests.</p>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="icon">🍱</div>
      <div class="num" id="s-available">0</div>
      <div class="label">Available Donations</div>
    </div>
    <div class="stat-card">
      <div class="icon">⏳</div>
      <div class="num" id="s-pending">0</div>
      <div class="label">Pending Requests</div>
    </div>
    <div class="stat-card">
      <div class="icon">✅</div>
      <div class="num" id="s-approved">0</div>
      <div class="label">Approved</div>
    </div>
    <div class="stat-card">
      <div class="icon">🍽️</div>
      <div class="num" id="s-meals">0</div>
      <div class="label">Meals Received</div>
    </div>
  </div>

  <div class="section-card">
    <div class="section-head">
      <h3>🥘 Available Food Donations</h3>
      <div class="search-bar">
        <i class="fa fa-search"></i>
        <input type="text" id="search" placeholder="Search food, location..." oninput="renderFoods()">
      </div>
    </div>
    <table>
      <tr>
        <th>Food Item</th>
        <th>Quantity</th>
        <th>Location</th>
        <th>Expires At</th>
        <th>Provider</th>
        <th>Action</th>
      </tr>
      <tbody id="food-tbody"></tbody>
    </table>
  </div>
</div>

<div class="toast" id="toast"><i class="fa fa-check-circle"></i> <span id="toast-msg"></span></div>

<script src="db.js"></script>
<script>
const user = DB.requireAuth('consumer');
if (user) {
  document.getElementById('user-name').textContent = user.name;
  document.getElementById('avatar').textContent = user.name[0].toUpperCase();
}

function renderStats() {
  const foods = DB.getAvailableFoods();
  const myReqs = DB.getRequestsByConsumer(user.id);
  document.getElementById('s-available').textContent = foods.length;
  document.getElementById('s-pending').textContent = myReqs.filter(r=>r.status==='pending').length;
  document.getElementById('s-approved').textContent = myReqs.filter(r=>r.status==='approved').length;
  document.getElementById('s-meals').textContent = myReqs.filter(r=>r.status==='approved').length * 10;
}

function renderFoods() {
  const q = document.getElementById('search').value.toLowerCase();
  let foods = DB.getAvailableFoods();
  if (q) foods = foods.filter(f => f.name.toLowerCase().includes(q) || f.location.toLowerCase().includes(q));
  
  const myReqs = DB.getRequestsByConsumer(user.id);
  const requestedFoodIds = myReqs.map(r => r.foodId);

  const tbody = document.getElementById('food-tbody');
  if (!foods.length) {
    tbody.innerHTML = `<tr><td colspan="6"><div class="empty"><i class="fa fa-box-open"></i>No food available right now. Check back soon!</div></td></tr>`;
    return;
  }
  tbody.innerHTML = foods.map(f => {
    const alreadyReq = requestedFoodIds.includes(f.id);
    return `<tr>
      <td><strong>${f.name}</strong></td>
      <td>${f.quantity}</td>
      <td><i class="fa fa-map-marker-alt" style="color:var(--text-muted);margin-right:4px"></i>${f.location}</td>
      <td><i class="fa fa-clock" style="color:var(--orange);margin-right:4px"></i>${f.expiry}</td>
      <td>${f.providerName || 'Anonymous'}</td>
      <td>${alreadyReq 
        ? `<span class="badge badge-pending">Requested</span>`
        : `<button class="btn-req" onclick="requestFood(${f.id},'${f.name}','${f.providerId}','${f.providerName}')">Request</button>`}
      </td>
    </tr>`;
  }).join('');
}

function requestFood(foodId, foodName, providerId, providerName) {
  DB.addRequest({ foodId, foodName, consumerId: user.id, consumerName: user.name, providerId, providerName });
  showToast('Request sent for ' + foodName + '!');
  renderStats(); renderFoods();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('toast-msg').textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function logout() { DB.clearSession(); window.location.href='login.html'; }

renderStats(); renderFoods();
</script>
</body>
</html>
