<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register — FoodShare</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
  --green:#2ecc71; --green-dark:#27ae60;
  --dark:#0d1117; --dark2:#161b22; --dark3:#21262d;
  --text:#e6edf3; --text-muted:#8b949e; --white:#ffffff;
  --error:#ff4d6d;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'DM Sans',sans-serif; background:var(--dark); color:var(--text); min-height:100vh; display:flex; flex-direction:column; }
nav { display:flex; justify-content:space-between; align-items:center; padding:20px 60px; border-bottom:1px solid rgba(255,255,255,0.06); }
.logo { display:flex; align-items:center; gap:10px; text-decoration:none; }
.logo-icon { width:36px; height:36px; background:var(--green); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; }
.logo h2 { font-family:'Playfair Display',serif; font-size:22px; color:var(--white); }
nav a { color:var(--text-muted); text-decoration:none; font-size:14px; font-weight:500; }
nav a:hover { color:var(--white); }
.page { flex:1; display:flex; align-items:center; justify-content:center; padding:40px 20px; }
.card { background:var(--dark2); border:1px solid rgba(255,255,255,0.08); border-radius:20px; padding:48px 40px; width:100%; max-width:440px; animation:slideUp 0.4s ease; }
.card-header { text-align:center; margin-bottom:32px; }
.card-icon { font-size:36px; margin-bottom:12px; }
.card-header h2 { font-family:'Playfair Display',serif; font-size:28px; color:var(--white); margin-bottom:8px; }
.card-header p { color:var(--text-muted); font-size:14px; }
.input-group { margin-bottom:18px; }
.input-group label { display:block; font-size:13px; font-weight:600; color:var(--text-muted); margin-bottom:8px; text-transform:uppercase; letter-spacing:0.5px; }
.input-wrap { position:relative; }
.input-wrap i { position:absolute; left:14px; top:50%; transform:translateY(-50%); color:var(--text-muted); font-size:14px; }
.input-wrap input, .input-wrap select {
  width:100%; padding:13px 14px 13px 40px;
  background:var(--dark3); border:1px solid rgba(255,255,255,0.1); border-radius:10px;
  color:var(--text); font-size:15px; font-family:'DM Sans',sans-serif; transition:0.2s;
}
.input-wrap input:focus, .input-wrap select:focus { outline:none; border-color:var(--green); background:var(--dark); }
.input-wrap input::placeholder { color:var(--text-muted); }
.input-wrap select option { background:var(--dark2); }

/* Role selector */
.role-selector { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px; }
.role-opt { position:relative; }
.role-opt input[type=radio] { position:absolute; opacity:0; }
.role-opt label {
  display:flex; flex-direction:column; align-items:center; gap:8px;
  padding:16px 12px; border:1px solid rgba(255,255,255,0.1); border-radius:12px;
  cursor:pointer; transition:0.2s; text-align:center;
}
.role-opt label:hover { border-color:rgba(46,204,113,0.3); background:rgba(46,204,113,0.05); }
.role-opt input:checked + label { border-color:var(--green); background:rgba(46,204,113,0.1); color:var(--green); }
.role-opt label .r-icon { font-size:24px; }
.role-opt label .r-name { font-size:13px; font-weight:600; }

.error-msg { background:rgba(255,77,109,0.1); border:1px solid rgba(255,77,109,0.3); color:var(--error); padding:12px 16px; border-radius:10px; font-size:14px; margin-bottom:16px; display:none; }
.success-msg { background:rgba(46,204,113,0.1); border:1px solid rgba(46,204,113,0.3); color:var(--green); padding:12px 16px; border-radius:10px; font-size:14px; margin-bottom:16px; display:none; }

.btn-submit { width:100%; padding:14px; border:none; border-radius:12px; background:var(--green); color:var(--dark); font-size:16px; font-weight:700; cursor:pointer; font-family:'DM Sans',sans-serif; transition:0.2s; }
.btn-submit:hover { background:var(--green-dark); transform:translateY(-1px); }
.card-footer { text-align:center; margin-top:24px; color:var(--text-muted); font-size:14px; }
.card-footer a { color:var(--green); text-decoration:none; font-weight:600; }

.role-label { display:block; font-size:13px; font-weight:600; color:var(--text-muted); margin-bottom:10px; text-transform:uppercase; letter-spacing:0.5px; }

@keyframes slideUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
</style>
</head>
<body>
<nav>
  <a href="index.html" class="logo">
    <div class="logo-icon">🌿</div>
    <h2>FoodShare</h2>
  </a>
  <a href="login.html">Already have an account? Login →</a>
</nav>

<div class="page">
  <div class="card">
    <div class="card-header">
      <div class="card-icon">🌱</div>
      <h2>Create Account</h2>
      <p>Join FoodShare and make a difference</p>
    </div>

    <div class="error-msg" id="error"></div>
    <div class="success-msg" id="success"></div>

    <div class="input-group">
      <label>Full Name / Organization</label>
      <div class="input-wrap">
        <i class="fa fa-user"></i>
        <input type="text" id="name" placeholder="Your name or org name">
      </div>
    </div>

    <div class="input-group">
      <label>Email Address</label>
      <div class="input-wrap">
        <i class="fa fa-envelope"></i>
        <input type="email" id="email" placeholder="Enter your email">
      </div>
    </div>

    <div class="input-group">
      <label>Password</label>
      <div class="input-wrap">
        <i class="fa fa-lock"></i>
        <input type="password" id="password" placeholder="Min 6 characters">
      </div>
    </div>

    <span class="role-label">I am a...</span>
    <div class="role-selector">
      <div class="role-opt">
        <input type="radio" name="role" id="r-provider" value="provider" checked>
        <label for="r-provider">
          <span class="r-icon">🍽️</span>
          <span class="r-name">Food Provider</span>
        </label>
      </div>
      <div class="role-opt">
        <input type="radio" name="role" id="r-consumer" value="consumer">
        <label for="r-consumer">
          <span class="r-icon">🤝</span>
          <span class="r-name">Consumer / NGO</span>
        </label>
      </div>
    </div>

    <button class="btn-submit" onclick="doRegister()">Create Account →</button>

    <div class="card-footer">
      Already have an account? <a href="login.html">Login here</a>
    </div>
  </div>
</div>

<script src="db.js"></script>
<script>
function doRegister() {
  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const pass = document.getElementById('password').value;
  const role = document.querySelector('input[name=role]:checked').value;
  const errEl = document.getElementById('error');
  const sucEl = document.getElementById('success');
  errEl.style.display='none'; sucEl.style.display='none';

  if (!name || !email || !pass) { errEl.textContent='Please fill in all fields.'; errEl.style.display='block'; return; }
  if (pass.length < 6) { errEl.textContent='Password must be at least 6 characters.'; errEl.style.display='block'; return; }

  const result = DB.registerUser(name, email, pass, role);
  if (!result.ok) { errEl.textContent=result.msg; errEl.style.display='block'; return; }

  sucEl.textContent='Account created! Redirecting to login...';
  sucEl.style.display='block';
  setTimeout(() => window.location.href='login.html', 1500);
}
</script>
</body>
</html>
