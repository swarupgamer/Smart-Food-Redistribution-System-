<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Requests — FoodShare</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root { --green:#2ecc71; --orange:#f39c12; --blue:#3498db; --red:#e74c3c; --dark:#0d1117; --dark2:#161b22; --dark3:#21262d; --text:#e6edf3; --text-muted:#8b949e; --white:#ffffff; --radius:16px; }
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'DM Sans',sans-serif; background:var(--dark); color:var(--text); min-height:100vh; }
nav { display:flex; justify-content:space-between; align-items:center; padding:16px 40px; background:var(--dark2); border-bottom:1px solid rgba(255,255,255,0.06); position:sticky; top:0; z-index:100; }
.logo { display:flex; align-items:center; gap:10px; }
.logo-icon { width:34px; height:34px; background:var(--green); border-radius:9px; display:flex; align-items:center; justify-content:center; font-size:16px; }
.logo h2 { font-family:'Playfair Display',serif; font-size:20px; color:var(--white); }
.nav-links a { color:var(--text-muted); text-decoration:none; font-size:14px; font-weight:500; padding:8px 14px; border-radius:8px; transition:0.2s; }
.nav-links a:hover, .nav-links a.active { color:var(--white); background:var(--dark3); }
.nav-logout { background:transparent; border:1px solid rgba(255,255,255,0.1); color:var(--text-muted); padding:7px 14px; border-radius:8px; cursor:pointer; font-size:13px; font-family:'DM Sans',sans-serif; }
.nav-logout:hover { background:var(--dark3); color:var(--white); }
.page { max-width:1100px; margin:0 auto; padding:40px 30px; }
.page-header { margin-bottom:28px; }
.page-header h1 { font-family:'Playfair Display',serif; font-size:30px; color:var(--white); margin-bottom:6px; }
.page-header p { color:var(--text-muted); }
.stats-row { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-bottom:28px; }
.stat-card { background:var(--dark2); border:1px solid rgba(255,255,255,0.07); border-radius:var(--radius); padding:20px 24px; display:flex; align-items:center; gap:16px; }
.stat-icon { width:44px; height:44px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0; }
.si-pending { background:rgba(243,156,18,0.1); }
.si-approved { background:rgba(46,204,113,0.1); }
.si-rejected { background:rgba(231,76,60,0.1); }
.stat-card .num { font-family:'Playfair Display',serif; font-size:28px; color:var(--white); font-weight:700; line-height:1; }
.stat-card .lbl { font-size:13px; color:var(--text-muted); margin-top:3px; }
.section-card { background:var(--dark2); border:1px solid rgba(255,255,255,0.07); border-radius:var(--radius); overflow:hidden; }
.section-head { padding:20px 24px; border-bottom:1px solid rgba(255,255,255,0.06); display:flex; align-items:center; justify-content:space-between; }
.section-head h3 { color:var(--white); font-size:17px; }
.filter-tabs { display:flex; gap:6px; }
.tab { background:transparent; border:1px solid rgba(255,255,255,0.1); color:var(--text-muted); padding:6px 14px; border-radius:6px; cursor:pointer; font-size:13px; font-family:'DM Sans',sans-serif; transition:0.2s; }
.tab.active { background:var(--green); color:var(--dark); border-color:var(--green); font-weight:600; }
table { width:100%; border-collapse:collapse; }
th { background:var(--dark3); color:var(--text-muted); font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; padding:14px 16px; text-align:left; }
td { padding:14px 16px; border-bottom:1px solid rgba(255,255,255,0.04); font-size:14px; }
tr:last-child td { border-bottom:none; }
.badge { display:inline-flex; align-items:center; gap:5px; padding:5px 12px; border-radius:20px; font-size:12px; font-weight:600; }
.badge-pending { background:rgba(243,156,18,0.12); color:var(--orange); }
.badge-approved { background:rgba(46,204,113,0.12); color:var(--green); }
.badge-rejected { background:rgba(231,76,60,0.12); color:var(--red); }
.empty { text-align:center; padding:60px 20px; color:var(--text-muted); }
.empty i { font-size:40px; margin-bottom:12px; opacity:0.3; display:block; }
.date-cell { color:var(--text-muted); font-size:13px; }
</style>
</head>
<body>
<nav>
  <div class="logo"><div class="logo-icon">🌿</div><h2>FoodShare</h2></div>
  <div class="nav-links" style="display:flex;gap:4px;">
    <a href="dashboard.html">Dashboard</a>
    <a href="view.html">Available Food</a>
    <a href="my-requests.html" class="active">My Requests</a>
  </div>
  <button class="nav-logout" onclick="logout()">Logout</button>
</nav>

<div class="page">
  <div class="page-header">
    <h1>📋 My Requests</h1>
    <p>Track all your food request statuses here.</p>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-icon si-pending">⏳</div>
      <div><div class="num" id="s-p">0</div><div class="lbl">Pending</div></div>
    </div>
    <div class="stat-card">
      <div class="stat-icon si-approved">✅</div>
      <div><div class="num" id="s-a">0</div><div class="lbl">Approved</div></div>
    </div>
    <div class="stat-card">
      <div class="stat-icon si-rejected">❌</div>
      <div><div class="num" id="s-r">0</div><div class="lbl">Rejected</div></div>
    </div>
  </div>

  <div class="section-card">
    <div class="section-head">
      <h3>Request History</h3>
      <div class="filter-tabs">
        <button class="tab active" onclick="filter('all',this)">All</button>
        <button class="tab" onclick="filter('pending',this)">Pending</button>
        <button class="tab" onclick="filter('approved',this)">Approved</button>
        <button class="tab" onclick="filter('rejected',this)">Rejected</button>
      </div>
    </div>
    <table>
      <tr>
        <th>Food Item</th>
        <th>Provider</th>
        <th>Requested On</th>
        <th>Status</th>
        <th>Updated</th>
      </tr>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<script src="db.js"></script>
<script>
const user = DB.requireAuth('consumer');
let currentFilter = 'all';

function render() {
  let reqs = DB.getRequestsByConsumer(user.id);
  document.getElementById('s-p').textContent = reqs.filter(r=>r.status==='pending').length;
  document.getElementById('s-a').textContent = reqs.filter(r=>r.status==='approved').length;
  document.getElementById('s-r').textContent = reqs.filter(r=>r.status==='rejected').length;
  if (currentFilter !== 'all') reqs = reqs.filter(r => r.status === currentFilter);
  reqs.sort((a,b) => b.id - a.id);
  const tbody = document.getElementById('tbody');
  if (!reqs.length) {
    tbody.innerHTML = `<tr><td colspan="5"><div class="empty"><i class="fa fa-inbox"></i>No ${currentFilter==='all'?'':currentFilter} requests yet.</div></td></tr>`;
    return;
  }
  tbody.innerHTML = reqs.map(r => {
    const d = new Date(r.createdAt);
    const up = r.updatedAt ? new Date(r.updatedAt).toLocaleDateString('en-IN',{day:'numeric',month:'short'}) : '—';
    const icons = { pending:'⏳', approved:'✅', rejected:'❌' };
    return `<tr>
      <td><strong>${r.foodName}</strong></td>
      <td>${r.providerName||'—'}</td>
      <td class="date-cell">${d.toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})}</td>
      <td><span class="badge badge-${r.status}">${icons[r.status]} ${r.status.charAt(0).toUpperCase()+r.status.slice(1)}</span></td>
      <td class="date-cell">${up}</td>
    </tr>`;
  }).join('');
}

function filter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function logout() { DB.clearSession(); window.location.href='login.html'; }
render();
</script>
</body>
</html>
