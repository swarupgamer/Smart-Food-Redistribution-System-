<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — FoodShare</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
  --green: #2ecc71; --green-dark: #27ae60;
  --dark: #0d1117; --dark2: #161b22; --dark3: #21262d;
  --text: #e6edf3; --text-muted: #8b949e; --white: #ffffff;
  --radius: 16px; --error: #ff4d6d;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'DM Sans',sans-serif; background:var(--dark); color:var(--text); min-height:100vh; display:flex; flex-direction:column; }

nav {
  display:flex; justify-content:space-between; align-items:center;
  padding:20px 60px; border-bottom:1px solid rgba(255,255,255,0.06);
}
.logo { display:flex; align-items:center; gap:10px; text-decoration:none; }
.logo-icon { width:36px; height:36px; background:var(--green); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; }
.logo h2 { font-family:'Playfair Display',serif; font-size:22px; color:var(--white); }
nav a { color:var(--text-muted); text-decoration:none; font-size:14px; font-weight:500; }
nav a:hover { color:var(--white); }

.page { flex:1; display:flex; align-items:center; justify-content:center; padding:40px 20px; }

.card {
  background:var(--dark2); border:1px solid rgba(255,255,255,0.08); border-radius:20px;
  padding:48px 40px; width:100%; max-width:420px;
  animation: slideUp 0.4s ease;
}
.card-header { text-align:center; margin-bottom:36px; }
.card-icon { font-size:36px; margin-bottom:12px; }
.card-header h2 { font-family:'Playfair Display',serif; font-size:28px; color:var(--white); margin-bottom:8px; }
.card-header p { color:var(--text-muted); font-size:14px; }

.input-group { margin-bottom:20px; }
.input-group label { display:block; font-size:13px; font-weight:600; color:var(--text-muted); margin-bottom:8px; text-transform:uppercase; letter-spacing:0.5px; }
.input-wrap { position:relative; }
.input-wrap i { position:absolute; left:14px; top:50%; transform:translateY(-50%); color:var(--text-muted); font-size:14px; }
.input-wrap input {
  width:100%; padding:13px 14px 13px 40px;
  background:var(--dark3); border:1px solid rgba(255,255,255,0.1); border-radius:10px;
  color:var(--text); font-size:15px; font-family:'DM Sans',sans-serif;
  transition:0.2s;
}
.input-wrap input:focus { outline:none; border-color:var(--green); background:var(--dark); }
.input-wrap input::placeholder { color:var(--text-muted); }

.error-msg { background:rgba(255,77,109,0.1); border:1px solid rgba(255,77,109,0.3); color:var(--error); padding:12px 16px; border-radius:10px; font-size:14px; margin-bottom:20px; display:none; }

.btn-submit {
  width:100%; padding:14px; border:none; border-radius:12px;
  background:var(--green); color:var(--dark);
  font-size:16px; font-weight:700; cursor:pointer;
  font-family:'DM Sans',sans-serif; transition:0.2s;
  display:flex; align-items:center; justify-content:center; gap:8px;
}
.btn-submit:hover { background:var(--green-dark); transform:translateY(-1px); }

.card-footer { text-align:center; margin-top:24px; color:var(--text-muted); font-size:14px; }
.card-footer a { color:var(--green); text-decoration:none; font-weight:600; }

.divider { border:none; border-top:1px solid rgba(255,255,255,0.06); margin:24px 0; }

.demo-accounts { background:var(--dark3); border-radius:12px; padding:16px; margin-bottom:24px; }
.demo-accounts p { font-size:12px; color:var(--text-muted); margin-bottom:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; }
.demo-btn {
  display:block; width:100%; text-align:left;
  background:rgba(46,204,113,0.08); border:1px solid rgba(46,204,113,0.15);
  color:var(--green); padding:8px 12px; border-radius:8px; font-size:13px;
  cursor:pointer; margin-bottom:6px; font-family:'DM Sans',sans-serif; transition:0.2s;
}
.demo-btn:last-child { margin-bottom:0; }
.demo-btn:hover { background:rgba(46,204,113,0.15); }

@keyframes slideUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
</style>
</head>
<body>
<nav>
  <a href="index.html" class="logo">
    <div class="logo-icon">🌿</div>
    <h2>FoodShare</h2>
  </a>
  <a href="register.html">Create Account →</a>
</nav>

<div class="page">
  <div class="card">
    <div class="card-header">
      <div class="card-icon">👋</div>
      <h2>Welcome Back</h2>
      <p>Login to your FoodShare account</p>
    </div>

    <div class="demo-accounts">
      <p>Quick Demo Login</p>
      <button class="demo-btn" onclick="fillDemo('admin@foodshare.com','admin123')">🛡️ Admin — admin@foodshare.com</button>
      <button class="demo-btn" onclick="fillDemo('raj@hotel.com','pass123')">🍽️ Provider — raj@hotel.com</button>
      <button class="demo-btn" onclick="fillDemo('help@ngo.com','pass123')">🤝 Consumer — help@ngo.com</button>
    </div>

    <div class="error-msg" id="error"></div>

    <div class="input-group">
      <label>Email Address</label>
      <div class="input-wrap">
        <i class="fa fa-envelope"></i>
        <input type="email" id="email" placeholder="Enter your email">
      </div>
    </div>

    <div class="input-group">
      <label>Password</label>
      <div class="input-wrap">
        <i class="fa fa-lock"></i>
        <input type="password" id="password" placeholder="Enter your password">
      </div>
    </div>

    <button class="btn-submit" onclick="doLogin()">
      <i class="fa fa-sign-in-alt"></i> Login
    </button>

    <div class="card-footer">
      Don't have an account? <a href="register.html">Register here</a>
    </div>
  </div>
</div>

<script src="db.js"></script>
<script>
function fillDemo(email, pass) {
  document.getElementById('email').value = email;
  document.getElementById('password').value = pass;
}

function doLogin() {
  const email = document.getElementById('email').value.trim();
  const pass = document.getElementById('password').value;
  const errEl = document.getElementById('error');
  errEl.style.display = 'none';

  if (!email || !pass) { errEl.textContent = 'Please fill in all fields.'; errEl.style.display='block'; return; }

  const result = DB.loginUser(email, pass);
  if (!result.ok) { errEl.textContent = result.msg; errEl.style.display='block'; return; }

  DB.setSession(result.user);
  if (result.user.role === 'admin') window.location.href = 'admin.html';
  else if (result.user.role === 'provider') window.location.href = 'provider.html';
  else window.location.href = 'dashboard.html';
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
